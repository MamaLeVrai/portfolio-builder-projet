spring.application.name=portfolio1

spring.datasource.url=jdbc:mysql://localhost:3306/portfolio
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

#spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# logs the SQL statements
# basic log level for all messages
logging.level.org.hibernate=info
# SQL statements and parameters
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.orm.jdbc.bind=trace


# Mustache Template engine
spring.mustache.prefix=classpath:/templates/
spring.mustache.suffix=.html

spring.security.user.name=marius
spring.security.user.password=password
spring.security.user.roles=manager

# ============================================================
# (Epic 5 - US-030 / US-031) Configuration de l'upload de fichiers
# ============================================================
# Active la réception de fichiers envoyés depuis les formulaires HTML
spring.servlet.multipart.enabled=true
# Taille maximale d'un seul fichier (5 mégaoctets)
spring.servlet.multipart.max-file-size=5MB
# Taille maximale de toute la requête (formulaire + fichier)
spring.servlet.multipart.max-request-size=5MB
# Dossier où les images uploadées seront sauvegardées sur le serveur
# Ce dossier est dans "static" pour que les images soient accessibles via /uploads/...
app.upload.dir=src/main/resources/static/uploads