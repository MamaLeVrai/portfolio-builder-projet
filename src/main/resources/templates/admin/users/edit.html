{{ > /partials/header}}

<div class="container">
    <div class="card" style="max-width: 800px; margin: 50px auto;">
        <div class="card-header">
            <h2 class="card-title">Éditer l'utilisateur</h2>
        </div>
        <div class="card-body">
            {{#user}}
            <form method="post" action="/admin/users/{{id}}/edit">
                <div style="margin-bottom: 15px;">
                    <label for="username" style="display: block; margin-bottom: 5px;">Nom d'utilisateur:</label>
                    <input type="text" id="username" name="username" value="{{username}}" readonly
                           style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; background-color: #f5f5f5;" />
                    <small style="color: #666;">Le nom d'utilisateur ne peut pas être modifié</small>
                </div>

                <div style="margin-bottom: 15px;">
                    <label for="firstname" style="display: block; margin-bottom: 5px;">Prénom:</label>
                    <input type="text" id="firstname" name="firstname" value="{{firstname}}" required
                           style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" />
                </div>

                <div style="margin-bottom: 15px;">
                    <label for="lastname" style="display: block; margin-bottom: 5px;">Nom:</label>
                    <input type="text" id="lastname" name="lastname" value="{{lastname}}" required
                           style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" />
                </div>

                <div style="margin-bottom: 15px;">
                    <label for="email" style="display: block; margin-bottom: 5px;">Email:</label>
                    <input type="email" id="email" name="email" value="{{email}}" required
                           style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" />
                </div>

                <div style="margin-bottom: 15px;">
                    <label for="role" style="display: block; margin-bottom: 5px;">Rôle:</label>
                    <select id="role" name="role" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                        <option value="">USER</option>
                        <option value="ADMIN" {{#isRoleAdmin}}selected{{/isRoleAdmin}}>ADMIN</option>
                    </select>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" name="archiver" value="true" {{#archiver}}checked{{/archiver}} />
                        <span>Archiver cet utilisateur</span>
                    </label>
                </div>

                <div style="margin-bottom: 15px;">
                    <label for="password" style="display: block; margin-bottom: 5px;">Nouveau mot de passe (optionnel):</label>
                    <input type="password" id="password" name="password"
                           style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;" />
                    <small style="color: #666;">Laissez vide pour ne pas changer le mot de passe</small>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                    <a href="/admin/users" class="btn btn-secondary">Annuler</a>
                </div>
            </form>
            {{/user}}
        </div>
    </div>
</div>

{{ > /partials/footer}}
