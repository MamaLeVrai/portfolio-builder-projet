<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Portfolio Builder</title>
<link rel="stylesheet" href="/styles/main.css">
<style>
.navbar {
    background-color: #333;
    overflow: hidden;
    padding: 10px 20px;
}
.navbar a {
    float: left;
    display: block;
    color: #f2f2f2;
    text-align: center;
    padding: 14px 16px;
    text-decoration: none;
}
.navbar a:hover {
    background-color: #ddd;
    color: black;
}
.navbar-right {
    float: right;
}
.alert {
    padding: 15px;
    margin: 20px auto;
    max-width: 800px;
    border-radius: 4px;
}
.alert-success {
    background-color: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
}
.alert-danger {
    background-color: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
}
</style>
</head>
<body>
<div class="navbar">
    <a href="/users">Portfolio Builder</a>
    <div class="navbar-right">
        <a href="/users/edit">Mon compte</a>
        <a href="/logout">Déconnexion</a>
    </div>
</div>
